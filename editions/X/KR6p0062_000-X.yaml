front:
  text: 淨土決前引溫陵李卓吾曰維摩大士云隨其心淨則佛土淨阿彌陀佛極樂國土者土之淨也念阿彌陀佛極樂國土者心之淨也念阿彌陀佛極樂國土便生阿彌陀佛極樂國土者隨其心淨則佛土淨也然則念佛者念此淨土也參禪者參此淨土也果何以別乎故念佛者必定往生淨土矣參禪者亦豈能舍此淨土而別有所往耶若別有所往是二土也非淨也阿彌陀佛極樂國土不容如是也參禪者固不待往生矣念佛者亦豈待有所往而後生耶若必待有所往而後生則是此以念佛而往彼彼以念我而來此一來一往亦是二土也非淨也阿彌陀佛極樂國土亦不容如是也故知阿彌陀佛淨土即自心淨土念佛參禪即所以自淨其心奉勸諸學者無高視禪客而輕目淨土也故集諸上聖勸人修淨土之語而合之以為淨土決淨土決目次自敘天台智者淨土十疑論宋無為居士十疑論序一心三觀壽禪師勸修淨業行脚求師宗本答問三大聖人現身勸修淨土經論指皈淨土祖師指皈西方西方偈贊西方五請念佛八偈
