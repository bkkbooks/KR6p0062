body:
  text: 天台智者淨土十疑論宋無為居士楊傑淨土十疑論序一心三觀溫陵禪師曰念佛法門未可單約事相而修佛具三身念存三觀以破三惑則無生忍位方可入焉念存三觀者如一聲佛遂了此能念體空所念無相即念存空觀所念之佛即報身即心破見思惑也雖能念體空所念無相不妨能念分明所念顯然即念存假觀所念之佛即應身即心破塵沙惑也正當能念所念空時即能念所念顯然正當能念所念顯時即是能念所念寂然空假互存乃念存中觀所念之佛即法身即心破無明惑也説則如是行人用心惟一念真更無如斯之辨卓吾和尚曰天台智者決疑十論可謂往生淨土之津梁矣後學又何疑乎有宋楊無為居士為之序蓋贊念佛者必定往生是亦一決疑也溫陵法師復為發明一心三觀之旨蓋贊念佛者必定見佛是又一決疑也合而觀之而後知天台淨土止觀之理無非發明此一大乘使學者知起念便生淨土開口便見佛不待往生之勞矣又何往生之疑而不一念南無阿彌陀佛乎宋人欲學為古文辭而不能無為居士乃不學而自能之其文辭高妙益以見念佛者無所往而不藉佛之力也幸各加意念佛可也壽禪師勸修淨業見萬善同歸集問行道念佛與坐念功德如何答譬如逆水張帆猶云得往更若張帆順水速疾可知坐念一口尚乃八十億劫罪消行念功德豈知其量故劫云行道五百遍念佛一千聲事業常如此西方佛自成問唯心淨土周遍十方何得託質蓮臺寄形安養而興取舍之念豈達無生之門欣厭情生何成平等答唯心佛土者了心方生如來不思議境界經云三世一切諸佛皆無所有唯依自心菩薩若能了知諸佛及一切法皆唯心量得隨順忍或入初地捨身速生妙喜世界或生極樂淨佛土中故知識心方生唯心淨土著境秪墮所緣境中如修多羅説若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退羣疑論問云諸佛國土亦復皆空觀衆生如第五大何得取著有相捨此生彼答汝但見説圓成實性無相之教破遍計所執畢竟空無之文不信説依他起性因緣之教即是不信因果之人説於諸法斷滅相者故華嚴偈云寧於無量劫具受一切苦終不遠如來不覩自在力問心外無法佛不去來何有見佛及來迎之事答唯心念佛以唯心觀遍該萬法既了境唯心了心即佛故隨所念無非佛矣般若三昧經云如人夢見七寶親屬歡喜覺已追念不知在何處如是念佛此喻唯心所作即有而空故無來去又如幻非實則心佛兩亡而不無幻相則不壞心佛空有無閡即無去來不妨普見按諸經云生安養者緣強地勝福備壽長蓮華化生佛親迎接便登菩提之位生如來之家處跋致之門受菩提之記身具光明妙相迹踐寶樹香臺獻供十方寧神三昧觸耳常聞大乘之法差肩皆鄰補處之人念念虗玄心心靜慮煩惱𦦨滅愛欲泉枯尚無惡趣之名豈有輪回之事安國鈔云所言極樂者有二十四種樂羣疑論云西方淨土有三十種益何乃愛河浪底沈溺無憂火宅焰中焚燒不懼且未脫業身終縈三障既不愛蓮臺化質應須胎藏稟形若受肉身全身是苦既沈三界寧免輪回故目連所問經云佛告目連譬如萬川長注有浮草木前不顧後後不顧前都會大海世間亦爾雖有豪貴富樂自在悉不得免生老病死秖由不信佛經後世為人更深困劇不能得生千佛國土是故我説無量壽佛國土易往易生而人不能深信反事九十六種邪道我説是人名無眼人名無耳人問龐居士云事上説佛國此去十萬里大海渺無邊動即黑風起往者雖千萬達者無一二忽遇本來人不在因緣裏如何通會而證往生答若提宗考本尚不説有佛有土豈言達之不達乎所以天真自具不涉因緣匪動絲毫常冥真體若約事論故非一等九品往生上下俱達或遊化國見佛應身或生報土覩佛真體或一夕而便登上地或經劫而方證小乘或利根鈍根或定意散意或悟有遲速根機不同或華開早晚時限有異今古具載凡聖俱生行相昭然明證目驗故釋迦世尊親記文殊當生阿彌陀佛土位登初地大經云彌勒菩薩問佛未知此界有幾許不退菩薩得生彼國佛言此娑婆世界有六千七億不退菩薩皆得往生智者大師一生修西方業所行福智二嚴悉皆回向臨終合門人唱起十六觀名乃合掌讚云四十八願莊嚴淨土香臺寶樹易到無人火車相現一念改悔者尚乃往生況戒定慧薰修行道甚力終不唐捐稱讚淨土經云十方恆河沙諸佛出廣長舌相遍覆大千證得無生豈虗搆哉問觀經明十六觀門皆是攝心修定觀佛相好諦了圓明方階淨域如何散心而能化往答九品經文自有升降上下該攝不出二心一定心如修定習觀二專心但念名號回向發願夫善惡二輪苦樂二報皆三業所造四緣所生共因所成五果所攝若心淨即香臺寶樹淨剎化生心垢則丘陵坑坎穢土稟質皆是等倫之果能感增上之緣是以離自心源更無別體華嚴經云譬如心王寶隨心見衆色衆生心淨故得見清淨剎大集經云欲淨汝界但淨汝心故知一切歸心萬法由我欲得淨界但行淨因如水性趣下火性騰上勢數如是何足疑焉卓吾書壽禪師勸修後語曰禪師自為餘杭小吏時即已勤修淨業矣以勤修故愛惜一切生命而不忍殺此尚為尊佛教誡然也乃以不忍殺故遂充之以至放生又以放生故遂充之以至買生放生又以買生放生故復又充之以至於監守自盜買放生命犯極刑亦甘之夫始之以不忍殺而極之至于自殺蓋寧自殺以成就吾不忍殺之初心此所志矣雖於理有所不宜勢有所不可然觀其志不可謂之不深信淨業者矣夫不殺者特佛一念耳修行中一事耳猶尚如此餘可知也如此而修則又何事之不可為何功之不可就何佛之不可成何阿彌陀之不可見乎上品上生閻君致禮固其宜矣修淨業者元有折攝二門釋迦為折彌陀為攝又有欣厭二門唯厭此生故唯恐捨之而不得唯欣彼生故自然見佛而不疑若愚者謂其不知厭惡此生不可也謂其不知感激諸佛折攝之恩亦不可也但以禪師之心觀之余尚為貪戀而不捨者耳師生上品余又不知何品矣幸而止有九品設使却有百千萬億品佘不將為百千萬億品最下之佛乎是可戒也然則修淨業者斷斷乎不可不以壽禪師為法而以余李卓吾老子為鑑而自戒矣抑余唯不能自戒是以敬録勸修之語以時觀省仍奉事禪師與天台智者于上方庶幾雖不能比于二師之萬一或可比于閻君之朝夕禮拜歸依也余又願人人皆宜如閻君之敬禮設像焚香于晨朝而讀其書也按本傳壽禪師者丹陽人初為餘杭縣吏虧欠庫錢幾盡有司鞠之止是買放生用罪當死臨刑顏色愈愈顧獄吏曰我在世放活萬萬生命今死去徑歸西方豈不樂哉錢王聞而奇之釋其罪遂為僧夢觀音以甘露灌其口住持永明寺至九十八歲合掌坐化瘞于塔下有僧每日繞塔禮拜人問其故答曰我撫州僧也因病至陰司見殿角有畫像一軸閻王日來頂禮余問主吏云此杭州永明寺壽禪師也凡人死者皆經此處唯壽禪師不經此已在西方極樂世界上品上生矣王敬其人故圖此供養行腳求師見歸元直指宗本問弟子欲脫生死不知依何法修禪師讚歎曰年紀幼而發心高聽吾所説徑路入行但念阿彌陀佛宗本曰凡夫罪業多云何一世念佛便得往生淨土答十六觀經云至心念南無阿彌陀佛一聲滅八十億劫生死重罪有人平生造五逆十惡臨終十念阿彌陀佛尚得往生況一世齋戒念佛乎問阿彌陀佛何故有如是廣大功德廣大行願答大阿彌陀經云我至成佛時名聲超十方人天欣得聞俱來主我剎地獄鬼畜生亦生我剎中是則凡在三界六道輪回之內者無所不度可知矣阿彌陀佛現在西方極樂世界又在十方世界教化無數天人以至蜎飛蠕動之類蜎飛者謂微細飛蟲也蠕動者謂微細蛆蟲也若此者佛尚化度況于人乎阿彌陀佛又有願云若稱我名必生我國若不爾者誓不作佛是以廣度衆生無有窮極而人一念歸依遂生其國由此推之念佛功德實不可思議也又云若有衆生欲生我國上品者須用慈心不殺愛護含靈具諸戒行讀誦大乘解第一義諦理深明供養三寶孝敬雙親悲憐貧苦教化有情若能如是念佛者決定上品上生直至成佛其或力量未充且自堅持齋戒一心念佛若能念念無間亦不在下品生矣況此法門不揀賢愚不擇貴賤不在貧富不分男女不問老幼不拘僧俗不論久近皆可以念佛念佛軌則亦不拘或高聲念低聲念流水念頂禮念攝心念參究念勸想念輪珠念行道念住立念靜坐念側臥念默念明念千念萬念皆同一念唯要決定信心求生淨土果能如是行持何用別尋知識可謂行船盡在把梢人達者同登安養國問世間之人多説家緣縈絆世務纏身且待老來然後念佛答苦哉苦哉豈不見死心禪師云世間之人財寶如山妻妾滿室日夜歡樂他豈不要長生在世爭奈前程有限暗裏相催符到便行不容遲滯閻羅老子不順人情無常鬼王有何面目且據諸人眼裏親見耳裏親聞前街後巷親戚眷屬朋友兄弟強壯後生死劫多少豈不聞古人云莫待老來方學道孤墳盡是少年人又云自從早年索妻養子經營家計受盡千辛萬苦忽然三寸氣斷未免一旦皆休若是孝順兒孫齋得幾僧看得部經燒得陌紙春三秋九做得碗羮飯哭得幾聲猶是記憶爺娘若是不肖之子父母方死骨頭未冷作撻財産出賣田園恣意作樂以此較之著甚麼急兒孫自有兒孫福莫與兒孫作遠憂復引古德云冷笑富家翁營生忙似箭囤內米生蟲庫中錢爛貫日裏把稱稱夜間點燈算形骸如傀儡莫教繩索斷死心如此苦口勸人曾許你且做世業待老來方念佛乎當思人生在世能有幾時石火電光眨眼便過趁此未老無病之前抖擻身心撥棄塵事得一日光景念一日佛名得一時工夫修一時淨業由他臨命終時好死惡死只要我之盤纏預辨了也我之前程穩穩當當了也若不如此後悔難追況此念佛法門人皆可行譬如千年暗室一燈照之則為明矣故雖殺馬屠牛之人放下屠刀亦可以修所以修者不難亦不妨一切俗事在官者不妨職業在士者不妨修讀在商者不妨販賣在農夫不妨耕種在婦人不妨女工在公門不妨事上在僧徒不妨參禪凡一切所為皆不相妨或在晨昏禮念或在忙裏偷間或念千聲百聲或念三五百聲或念十聲唯要回向發願願往西方誠能如是決定往生矣又曰善男子今將一法界之法付囑于汝十法界者佛法界菩薩法界緣覺法界聲聞法界天法界人法界修羅法界餓鬼法界畜生法界地獄法界夫十法界者一心具足隨造隨受據你所作因還你所作果善行惡行世間之因也三界六道世間之果也持戒念佛出世間之因也淨土成佛出世間之果也人天路上作福為先生死海中念佛第一今有欲快樂人天而不修福欲出離生死而不念佛是猶鳥無翼而欲飛木無根而欲茂奚可得哉要將念佛為正因如今是因臨終是果作惡而惡境現前念佛而佛果自至豈不見華嚴經云若人欲了知三世一切佛應觀法界性一切唯心造是也宗本答問或問世間人別執公案只期參禪悟道不願往生淨土何如答參禪不礙念佛念佛不礙參禪且如往生録內高僧傳中賢愚並生今古皆爾盡拋穢土俱趣淨方孕七寶池捨胞胎苦超凡人聖得道證真不歷三祗便成佛道豈非佛力難思也哉故欲超生死輪回得涅槃樂者無出往生法門矣何以故娑婆濁境衆苦集而求道難成淨土樂諸善聚而位登不退稱名號者諸佛護念而往生發菩提者彌陀光照而增進菩薩羅漢與其同儔水鳥樹林悉皆念佛耳畔常聞妙法心中頓絶貪嗔快樂無窮壽量何極一生彼土便獲阿惟豈比人天道中觸目多諸違順權乘路上善根希有周圓地前三賢尚未見道而失念舍利六住猶遇惡緣而退心故知三乘之士歷僧祇劫而功行無成念佛之門于彈指頃而位階不退是以生淨土者有進無退決定成佛彌陀經云極樂國土衆生生者皆是阿跋致阿跋致者不退轉地是也嗟乎初心信淺非他力難以進修我佛願深但有緣悉皆攝受諸仁者從上佛祖立教開示念佛法門何況今之禪流不信往生淨土凡修淨土者不礙于參禪何參禪者乃薄淨土而不修也或問阿彌陀佛有因地否宗本曰阿彌陀佛因地載於藏教甚多云我作佛時説經行道十倍于諸佛不得是願終不作佛又云稱我名號定生我國不得是願終不作佛是以願廣緣強感動世人又不見大慈菩薩讚佛偈云十方三世佛阿彌陀第一非但菩薩稱讚十方諸佛亦稱讚之問十方世界有無量人念佛焉能悉知其時盡皆接引答日月是一小世界光明猶能普照萬類況佛之光明乎不見彌陀經云彼佛何故號阿彌陀舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀應知佛之光明廣大無比小乘羅漢尚有三明六通隨類現化況佛之神通妙用乎何則身常禮佛佛則見之天眼通故口常念佛佛則聞之天耳通故心常憶佛佛則知之他心通故諸仁者只要自己虔切修持不須疑佛無能接引又問既有如是功德何必連聲舉念譬如叫我名字不過一二三聲足矣答前不云乎稱我名號定生我國以其願也觀經云念阿彌陀佛一聲滅八十億劫生死重罪況連聲不斷乎彌陀經云以稱名故諸罪消滅勢至圓通云憶佛念佛必定見佛上至一心不亂專持名號下至十念成功往生淨土是也三大聖人現身勸修淨土唐洛陽罔極寺釋慧日中宗朝得度日見義淨三藏躬詣竺乾遂生羡慕誓遊西域始泛舶渡海經三載乃達天竺尋求梵本訪善知識獨影孤征雪嶺胡鄉無所不到既經多苦深厭閻浮乃歎曰何國何方有樂無苦何法何行能速見佛遍問天竺三藏學者皆讚淨土合於金口其于速疾是一生路盡此報身必得往生日聞已頂受漸至北印度健馱羅國王城東北有一大山山有觀音像日遂七日叩頭祈請以斷食畢命為期至七日夜觀音空中現紫金色相垂右手摩日頂曰汝欲傳法自利利他唯有西方彌陀佛國勸令念佛誦經回願往生到彼國已見佛及我自當知淨土法門勝過諸行説已忽滅日斷食既困聞此加壯及登嶺東歸計行七十餘國總一十八年開元七年方達長安進帝佛真容梵策等賜號慈愍三藏主法師又唐大曆二年法照大師棲止衡州雲峰寺勤修不懈唯以勸人念佛為急一日僧堂粥鉢內兩次現五臺勝境勝境中復現有寺寺有金榜題云大聖竹林寺於是心懷渴仰欲禮五臺四年八月十三日發行至五年四月五日到五臺縣遙見佛光寺南數道白光六日到佛光寺其夜四更見一道光從北山下來射照照忙入堂內問衆云此何祥也有僧答言此大聖不思議光常覺有緣照聞已即具威儀尋光至寺寺東北五十里間果有山山下有澗澗北有一石門見二青衣可年八九歲顏貌端正立于門首一稱善財二曰難陀相見歡喜問訊設禮引照入門向北行五六里見一金門樓至門乃是一寺寺前有金榜題曰大聖竹林寺一如鉢中所見者方圓可二十里一百二十院皆有寶塔莊嚴其地純是黃金流渠花樹充滿其內照入寺至講堂見文殊在西普賢在東各據獅子之座説法之音歷歷可聽文殊左右菩薩萬餘普賢亦有無數菩薩圍繞照至二菩薩前作禮問言末代凡夫去聖時遙知識轉劣垢障尤深佛法浩瀚未審修行於何法門最為捷要文殊報言汝今念佛今正是時諸修行門無過念佛所以者何我於過去劫中因念佛故得一切種智是故一切諸佛法般若波羅蜜甚深禪定乃至諸佛皆從念佛而生故知念佛是諸法之王汝當常念無上法王令無休息照又問當云何念文殊言此世界西有阿彌陀佛彼佛願力不可思議汝當繼念令無間斷命終之後決定往生永不退轉説是語已二大聖各舒金手摩照頂為授記別照聞已歡喜踊躍禮謝而退已上二則載于有宋高僧傳俱在藏內富字函經論指歸淨土大無量壽經云佛告彌勒於此世界有七百二十億不退菩薩往生極樂國土諸小行菩薩不可稱計又不但我國為然十方世界無量大菩薩衆盡念阿彌陀佛願住阿彌陀佛國土彌陀經云若有善男子善女人聞説阿彌陀佛執持名號以稱名故諸罪消滅其人臨命終時即得往生阿彌陀佛極樂國土釋迦佛云汝等皆當信受我語及諸佛所説若有衆生聞是説者應當發願生彼國土十六觀經云若善男子及善女人但聞佛名二菩薩名除無量劫生死之罪何況憶念念南無阿彌陀佛一聲乎當知此人是人中芬陀利華觀世音菩薩大勢至菩薩為其勝友大智度論云佛是無上法王諸大菩薩以為法臣諸臣所尊重者唯佛法王也有一菩薩自念往昔謗般若墮惡道受無量苦復經無量劫來雖修餘行不能得出苦海後遇善知識教念阿彌陀佛即得滅除罪障超生淨土我今應當禮謝阿彌陀佛何以彼父母親友人天王等不能度我出離苦海唯阿彌陀佛願力攝受是以得出苦海偈云若人願作佛心念阿彌陀即得為現身故我皈命禮又云佛世一老人求出家舍利弗不許佛觀此人曩劫採椎為虎所逼上樹失聲念南無佛有此微善遇佛得度獲羅漢果吁一稱其名尚得解脫況終身念佛乎蓮宗寶鑑云彌陀實衆生之慈父是以才稱寶號已投種於蓮胎一發菩提即標名於金地淺信不持大愚大錯堪歎時逢末代多有邪見迷流貶淨業為權乘嗤誦持為粗行豈非耽溺火宅自甘永劫之沈淪乎淨土境觀要門云夫淨土法門者乃末世衆生出生死之要路截苦海之舟航一生彼處永無退轉以金色身飛行自在無虎狼獅子蚊虻蚤虱之所逼惱無雷霆風雨寒熱飢渴之所煎熬蓮華化生壽命無量既無生老病死等苦是為極樂世界故我釋迦如來欲令此土在迷衆生出離衆苦開折伏之門彌陀慈父示攝受之路所以苦心丁寧偏讚淨土普勸往生良由於此安樂集云能念阿彌陀佛即斷一切業障譬如有人用獅子筋為琴絃其聲一奏一切餘絃悉斷亦如有人取牛羊驢馬諸乳置一器中若將獅子乳一滴投之一切諸乳悉化為水若人于菩提心中能念阿彌陀佛一切惡魔諸障自然消滅得生淨土矣大乘月藏經云末法時中億億衆生起修行道未有一得者皆因五濁惡世雜學難成唯有淨土一門可通入路當知自行難圓他力易就如劣士附輪王之勢飛遊四天凡質假仙藥之功升騰三島實為易行之道疾得相應慈旨丁寧須銘飢骨寶王論云浴大海者已用于百川念佛名者必成于三昧亦猶清珠下於濁水濁水不得不清念佛投於亂心亂心不得不佛大品經云若人散心念佛亦得離苦其福不盡況定意念佛也上至一心不亂下至十念成功華嚴經云寧受地獄苦得聞諸佛名不受無量樂而不聞佛名正法難聞品云佛説世間人民得聞阿彌陀佛名號若慈心喜悅志意清淨毛髮聳然淚即出者皆是纍世常行佛道非凡人也若不信佛語不信念佛不信往生皆從惡道中來餘殃未盡愚癡不解故為汝等説此大法令見阿彌陀佛及其國土護口經説有一餓鬼形狀醜惡身出猛𦦨口出蛆蟲膿血諸衰臭穢遠徹舉聲號哭東西馳走是時滿足羅漢問曰汝宿何罪今受此苦餓鬼答曰吾往昔時曾作沙門出一惡言阻他信善今遭此苦尊者還閻浮提誡諸比丘凡見人修毫髮善事只宜歡喜贊助勿令毀逆不成吾墮惡類以來數千萬劫受苦設使脫得鬼形復入地獄爾時餓鬼説此語已號哭投地如大山崩聞斯之説實可寒心此鬼出一惡言尚遭多劫之苦何可障人拜佛念佛哉金剛科儀云野狐尚聽百丈法螺螄猶護金剛經十千遊魚聞佛號化為天子五百蝙蝠聽法音總作聖賢蟒聞懺以生天龍聽法而悟道彼物尚能領悟況人可不回心念佛蓮宗寶鑑云昔我法藏發弘誓啓極樂之玄途故佛世尊指西方示韋提之妙域是乃廣長舌覆而同讚諸餘經盡而獨留蓋以利生之喜捨心增應化之慈悲量大教分九品乃別開方便之門觀明一心實徑直還源之路聖尼際會如久客歸于家鄉感應道交似稚子投于慈母況復慈光願攝佛力難思順水乘船不勞自力推門落臼豈有他哉有願必迎無機不被鸚鵡頻伽尚有法音演唱蜎飛蠕動悉蒙教化恩慈聖境非虗佛言不妄何乃甘心伏意幸禍樂災却誹清淨之貪戀煩惱之世焦蛾爛繭自處餘殃籠鳥鼎魚翻稱快樂皆由善力微而業力勝信根少而罪根多是以三界茫茫四生擾擾盡貪生而兀兀悉逐業以悠悠匪夙生之有幸豈得遇于斯因擊鼓開囹圄之門宜應速出逢舟濟沈淪之難詎可遲疑普皆如説奉行盡心頂禮信受問曰既言信受未知信何法門答曰信憑經中佛説念佛定生淨土信念佛定滅諸罪信念佛定得佛護信念佛臨終定得佛來接引信念佛往生定得不退地信念佛生淨土定不墮三惡道今時人信持戒而不信念佛信奉佛而不信往生淨土是皆自失其大利也故欲到西方要由深信君看淨土恆沙佛盡是當年正信人祖師指歸西方問六祖言東方人造罪念佛求生西方西方人造罪念佛求生何國答六祖只説僧俗喻於東西何曾説無佛國不見壇經云在家能行如東方人無罪出家不修如西方人有愆今人不窮古教強要狐言鳥語古德云若人排毀淨土不信往生者當受拔舌之苦如何後學反行魔説既不能自修又障他人修哀哉李卓吾曰六祖破人念佛求生西方者恐人執相求佛而不見自性也金剛經所謂若以色見我以音聲求我是人行邪道不能見如來是也又曰一切有為法如夢幻泡影如露亦如電應作如是觀凡所有相皆是虗妄是也夫人若不見自性而但以音聲為我執有相為佛則亦奚止十萬八千里哉六祖大師之破也宜也然苟見佛性矣則我之音聲與夫妄幻虗假之夢幻泡影露電又曷嘗一刻之不有哉雖謂實有西方亦可也天如和尚云多見今之參禪者不究如來之了義不知達磨之玄機空腹高心習為狂妄見修淨土之人則笑之曰彼學愚夫愚婦之所為何其鄙哉豫嘗謂非鄙愚夫愚婦也乃鄙文殊普賢馬鳴龍樹也此等之人非特自迷正道反成謗法之業靈芝法師云博地凡夫業惑纏縛流轉五道百千萬劫受諸苦惱忽聞淨土志願求生一日稱名即超彼國可謂萬劫難逢千生一遇若人肯念阿彌陀佛超過一切善根縱然能行施戒禪誦亦不如念佛功德孤山法師云夫求生淨土者是假他力彌陀願攝釋迦勸讚諸佛護念三者備矣苟有信心往生極易如渡大海既得巨航仍有良導加以順風必能速到彼岸矣若其不肯登舟遲疑險道者誰之過歟楊提刑云有佛釋迦是大導師指清淨土是安樂國阿彌陀佛是淨土師爾諸衆生若生彼土則無諸苦不聞知者固可哀憐亦有善士發三種心不求生者尤可嗟惜一曰吾當超佛越祖淨土不足生也二曰處處皆淨土西方不必生也三曰極樂聖域我輩凡夫不能生也夫行海無量普賢願見彌陀佛國雖空維摩常修淨土十方如來有廣舌之讚十方菩薩有同往之心試自忖量孰與諸聖謂不足生者何其自欺哉至如龍樹祖師也楞伽經有預記之文天親教宗也無量論有求生之偈慈恩通讚首稱十勝智者析理明辨十疑彼皆上哲精進往生謂不必生者何其自慢哉火車可滅舟石不沈現華報者莫甚於張馗十念而超勝處入地獄者莫速於雄俊再蘇而證妙因世人愆尤未必若此謂不能生者何其自棄哉中峰祖師云娑婆苦娑婆苦娑婆之苦誰能數世人反以苦為樂甘住其中多失所臭皮袋裏出頭來長養無明病成蠱驀然三寸氣消亡化作寒灰埋下土五趣遷流不暫停百劫千生受淒楚諸仁者何如急早念彌陀捨此娑婆苦西方樂西方樂西方之樂誰能覺人民國土總殊勝了無寒暑并三惡蓮華胎裏出頭來時聽法音與天樂琉璃地瑩絶纖塵金銀珠寶成樓閣化衣化食自然榮壽命無量難籌度諸仁者何如及早念彌陀取彼西方樂古音禪師云一句阿彌陀佛宗門頭則公案譬如騎馬拄杖把穩生涯一段不拘四衆人等持之悉有應驗現生長福消災報滿永除罪難若人立地受持無不隨心滿願幸生中土為人如上寶山一遍切莫空去空回所務急宜早辦閻王不貴金珠唯重彌陀一卷一生富貴如雲百歲光陰若電知音切莫遲延急早作箇轉變佛為苦海舟航勸君早渡彼岸行住坐臥之中一句彌陀莫斷須信因深果深直教不念自念若能念念不空管取念成一片當念認得念人彌陀與我同現便入念佛三昧親證極樂內院蓮胎標的姓名極功之者自見親見彌陀授記便同菩薩作伴直至無上菩提永劫隨心散誕依得此道歸來決定成佛不欠白樂天頌云豫年七十一不復事吟哦看經費眼力作福畏奔波何以度心眼一聲阿彌陀行也阿彌陀坐也阿彌陀縱饒忙似箭不離阿彌陀達人應笑我多却阿彌陀達又怎麼生不達又如何普勸法界衆同念阿彌陀要脫輪回苦須念阿彌陀百丈智海禪師是江西馬祖的子天下叢林依他建立天下清規依他舉行看他為病僧念誦之規云集衆同聲舉揚一偈稱讚阿彌陀佛復同聲稱念南無阿彌陀佛或百聲或千聲回向伏願云諸緣未盡早遂輕安大命難逃徑登安養又看他津送亡僧念誦回向伏願云神超淨域業謝塵勞蓮開上品之華佛受一生之記至于茶毗之際但令維那引聲高唱南無西方極樂世界大慈大悲阿彌陀佛如是十唱而大衆十和總名之曰十念也唱畢復回向云云以上稱揚十念資助往生非淨土之指歸乎自百丈來凡津送亡僧皆依此法然則所謂合五家之宗派盡天下之禪僧無有一人不歸淨土者矣慈照宗主云有行無願其行必孤有願無行其願必虗夫願者樂也欲也欲生西方淨土樂見阿彌陀佛必須發願方得往生華嚴經云不發大願魔所攝持一切佛事從大願起欲成無上道故須得願波羅蜜所以普賢廣無邊願海彌陀有六八願門是知十方諸佛上古先賢皆因願力成就菩提智度論第八卷問曰諸菩薩行業清淨自得勝報何必要立誓願然後得之答作福無願無所標立願為道御能有所成如佛所説若人聞説生天之樂心當願樂修生天福命終之後各生其中此皆願力之所致也華嚴行願品云是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失乃至象馬車乘珍寶伏藏如是一切無復相隨唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界故云法門廣大無願不從備觀今時信心歸投佛會者或為病苦而發心或為報親而舉意或為保扶家宅或為怖罪持齋雖有信心而無行願雖云念佛不達本根凡修善緣皆為了還心願罕有為自己生死發願念佛求生淨土者往往香燭道場祝願回向之辭皆是表獻神明消災延壽而已故與經懺本意相違臨終所以不得往生由無行願故也又有一等癡人投佛受戒乃於三寶前焚香誓願云我若破戒甘當惡病纏身永墮地獄或言左眼出血右眼出膿自肯自甘自願受報殊不知佛祖興慈運悲何嘗教人如此皆是邪師過謬錯將罰呪以為發願何惑之甚哉豫嘗愍念勸令同發正願求生淨土願同作佛若彼妄認四大為我身六塵為實有未嘗暫省回光齋戒念佛從生至老唯憂家緣不辦財不稱心雖曰積善奉佛禮拜燒香只願富貴榮華長生不死才做此小好事便有伏願數般要保穀米盈倉蠶絲倍萬子孫光顯牛馬孳生才一不如意便怨佛不保全日日財喜增添始道天龍感應如此貪謀盡屬愚癡今日有緣得逢佛法當須究本願捨娑婆願生淨土亦如久客在于他鄉今日思欲歸于故里不見懺中云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎是也慈照宗主偈曰萬法從心生萬法從心滅我佛大沙門常作如是説持戒無信願唯得人天福福盡受輪回展轉難出離看經無慧眼不識佛深意後世得聰明亂心難出離不如念佛好回向生樂國釋迦金口説彌陀親攝受諸佛皆護念諸天善護持譬如貧家女腹孕轉輪王諸天常愛護貧女自不知腹中有貴子今此念佛人其意亦如是憶佛常念佛不久當成佛諸佛善護持其人自不知我當生淨土劫要來後世再得生人中譬如貧人家地內有伏藏藏神常守護不令其有失貧人自不知家內有寶藏逐日趁客作求衣食自濟今此念佛人其意亦如是不知念佛人具足如來藏自説我無分反要生人中譬如病人家自有真妙藥不知妙藥性不能自治病每日牀枕邊痛苦受無量今此念佛人其意亦如是不知念佛心能滅貪嗔病能為大醫王能為大寶藏利濟一切人能為大法王覆護一切衆將為是凡夫不得生淨土且自持齋戒後世願為人展轉更修行方可生彼國多見修行人常作如是説不稱彌陀願不念淨土經邪見障覆心畢竟難出離非是他人障皆是自障心今世不得生一蹉是百蹉勸汝修行人信我如來説佛無不實語因風吹於火用力不消多幸有念佛心回願超三界或問永明壽禪師曰但見性悟道便超生死何用繫念彼佛求生他方答真修行人應自審察如人飲水冷暖自知諸仁者當觀自己行解實得見性悟道受如來記紹祖師位能如馬鳴龍樹否得無礙辨才證法華三昧能如天台智者否宗説皆通行解兼修能如忠國師否此諸大士皆明垂言教深勸往生蓋是自利利他豈肯誤人自誤況大雄讚歎金口丁寧希從昔賢蓋稟佛敕定不謬誤世四料揀云有禪無淨土十人九錯路陰境若現前瞥爾隨他去無禪有淨土萬修萬人去但得見彌陀何愁不問悟有禪有淨土猶如戴角虎現世為人師來生作佛祖無禪無淨土鐵牀并銅柱萬劫與千生沒個人依怙既不明佛理又不願往生永劫沈淪何由出離諸仁者欲超生死速證菩提於此四種擇善行之長蘆賾禪師勸人曰經云彼國衆生無有衆苦但受諸樂故名極樂今以娑婆對而比之此則血肉形軀有生皆苦彼則蓮華化生無生苦也此則時序代謝衰老日侵彼則寒暑不遷無老苦也此則四大難調多生病患彼則化體香潔無病苦也此則七十者希無常迅速彼則壽命無量無死苦也此則親情愛戀有愛必離彼無父母妻子無愛別離苦也此則仇敵冤讐有冤必會彼則上善聚會無冤憎會苦也此則困苦飢寒貪求不足彼皆衣食珍寶受用現成此或醜穢形骸根多缺漏彼則端嚴相貌體有光明此則輪轉生死彼則永證無生此則丘陵坑坎荊棘為林土石諸山穢惡充滿彼則黃金為地寶樹參天樓聳七珍花敷四色此則雙林已滅龍華未來彼則阿彌陀佛現在説法此則觀音勢至徒仰嘉名彼則與二上人親為勝友此則羣魔外道惱亂正修彼則佛化一統魔外絶縱此則媚色妖淫迷惑行者彼則正報清淨實無女人此則惡獸魑魅交扇邪聲彼則水鳥樹林咸宣妙法二土較量境緣回別而樂之勝其數無窮是以了義大乘無不指歸淨土前賢後聖自他皆願往生嗚呼人無遠慮必有近憂一失人身萬劫難復故率大海衆各念阿彌陀佛回向同緣願生彼國操船順水既加櫓棹則十萬程途不勞自至也元祐四年冬宗賾夜夢一男子烏巾白衣可三十許風貌清美舉措賢雅揖謂宗賾曰欲入公彌陀會告書一名宗賾乃取蓮華勝會録秉筆問曰公何名曰普慧宗賾書已白衣者又云家兄亦告上名宗賾問曰令兄何名曰普賢言訖遂隱宗賾覺而詢諸耆宿皆云華嚴離世間品有二大菩薩名宗賾以為佛子行佛事助佛揚化必有賢聖幽贊然則預此會者豈小緣哉龍舒王居士勸人曰大阿彌陀經云十方有無量菩薩往生阿彌陀佛國彼菩薩尚欲往生我何人哉略舉數條以為證青草堂後身曾魯公哲老後身多憂苦古老後身耽富貴法華尼後身作官妓皆是不信西方展轉輪回受苦或曰參禪固難見性學仙何如答不修淨土而欲學仙是捨目前之美玉而求不可必得之碔砆豈不惑哉按楞嚴有十種仙皆壽千萬歲數盡復入輪回世人學仙者萬不得一縱使得之又不免輪回為著於形神而不能捨去也且形神者乃真性中所現之妄想故寒山詩云饒汝得仙人恰似守尸鬼非若佛家之生死自如而無所拘也近自數百年來得仙者唯鍾離呂公豈不聞洞賓飛劒斬黃龍却被黃龍降伏及見黃龍禪師方悟真性了道遂説一偈云棄却瓢囊擊碎琴如今不戀永中金自從一見黃龍後始覺從前錯用心又不聞後魏曇鸞法師初自陶隱居得仙經十卷鸞欣然自得以為神仙必可致後遇僧菩提留支問云佛道有長生乎能却老為不死乎支云長生不死吾佛道也遂以十六觀經與之云汝可誦此則三界無復生六道無復往盈虗消息禍福成敗無得而至其為壽也有劫石焉有河沙焉沙石之數有限壽量之數無窮此吾金仙氏之長生也鸞深信之遂焚仙經而專修觀經雖寒暑之變疾病之來亦不懈怠魏王憐其志尚號為神鸞一日告弟子云地獄諸苦不可以不懼九品淨業不可以不修因令弟子高聲念阿彌陀佛鸞西向閉目叩頭而亡是時僧俗同聞管絃絲竹之聲從西而來由此觀之淨土法門最為捷徑況神仙者有所得則祕而不傳以謂泄天機而有罪佛法門唯恐傳之不廣直欲度盡衆生而後已是其慈悲廣大非神仙之可比明矣丞相鄭清之勸人曰今之學佛者不過禪教律究竟圓頓莫如禪非利根上器神領意解者未免墮頑空之失研究三乘莫如教非得魚忘筌因指見月者未免鑽故紙之病護善遮惡莫如律非身心清淨表裏一如者未免自纏縛之苦論其所入則禪教律要其所歸則戒定慧若不由禪教律而得戒定慧者其唯淨土之一門乎龍舒曰華嚴經云人生有二天人隨人一名同生二名同名天人常見人人不見天人此二天人豈非善惡二部童子之徒歟人之舉意發言動步常念此二天人見人而能無愧如此修淨土則必上品上生或曰一人尚有二天人何天人之多也曰一月普現一切水豈必月之多哉龍舒曰有修橋人有毀橋人此天堂地獄之小因也有坐轎人有荷轎人此天堂地獄之小果也觸類長之以修淨土上品往生復何疑哉又曰晝必有夜必為夜備暑必有寒必為寒備存必有去必為去備何謂夜備燈燭牀蓐何謂寒備衾裘炭薪何謂去備福慧淨土又曰豫遍覽藏經却無陰府寄庫之説奉勸世人以寄庫所費之資請僧為西方之供一心西方則必得往生若不為淨土功德而為陰府寄庫則是志在陰府死必入陰府矣譬如有人不為君子之行以交結賢人君子乃寄錢於司理院獄子處待其下獄則用錢免罪豈不謬哉昔張善和一生殺牛臨終自見地獄相現遇僧教令念阿彌陀佛念未十聲見佛接引往生淨土又有一婦人常念青蓮華香白蓮華香華樹香果樹香乘此四句之功亦得往生淨土況誦全部而不生乎曇翼法師前身為雉聽得僧人通法華經便得轉生為僧成道況人誦經念佛而不見佛乎又有一鸚鵡二鸜鵒念阿彌陀佛尚得往生淨土況人念佛而不生乎又曰如人入大城中必先覓安下處却出幹事抵暮昏黑則有投宿之地先覓安下處者修淨土之謂也抵暮昏黑者大限到來之謂也有投宿之地者生蓮華中不落惡趣之謂也又如春月遠行先須備雨具驟雨忽至則無淋漓狼狽之患先備雨具者修淨土之謂也驟雨忽至者大命將盡之謂也無淋漓狼狽之患者不至沈淪惡趣受諸苦惱之謂也且先覓安下處不妨自己幹事先備雨具不妨自己遠行先修淨土不妨一切世務人何為而不修乎雖罪惡人亦可修譬如鐵石雖重賴舟船可渡針雖輕不賴舟船不可渡人有重罪仗佛力可生淨土罪惡雖輕不仗佛力亦不得生又如蟣虱萬死萬生不能一里若附人身千里可至仗佛力而生淨土者亦復如是強健之時若不預辨閉眼之後將奈之何世間晝必有夜寒必有暑人所共知無肯隱者若曰生必有死人乃諱之不肯説出何太蔽乎諸仁者此時不修甚可惜也又曰人生時種種事務無不挂懷一旦大限到來盡皆拋去雖我此身猶是棄物況身外乎言思之恍如一夢古人有言一日無常到方知夢裡人萬般將不去唯有業隨身業者謂善業惡業此皆將得去者豈可不以淨土為業乎有了明長老為衆普説指此身而言曰此為死物其內鱍鱍地者為活物莫於死物上作活計宜於活物上作活計豫深愛此語凡貪種種外物以奉其身者皆是死物上作活計也知歸子問善導和尚曰蒙開誨念佛之法但恐死至之時心識散亂仍慮他人惑動正念忘失淨因師曰善哉問也凡一切人命終須是不得怕死常念此身多苦若得捨此超生淨土受無量快樂乃是稱意之事如脫弊衣得換珍服其於弊衣肯生戀著但遇病時便念無常一心待死叮囑家人及看病往來問侯之人凡來我前不得説眼前間雜之話亦不須軟言安慰祝願安樂此皆虗花無益若病重將終親屬亦不得垂泪哭泣嗟歎懊惱惑亂心神但當同聲念佛助其往生待氣盡了多時然後哀泣未晚若知死是歸去能不哀泣尤為達理也況往生淨土捨若得樂慎不宜哭泣使死者心亂也豫又多見世人平常念佛禮讚發願求生西方及至病來却又怕死都不説著往生之事直待氣消命盡識投冥界方始十念鳴鐘恰如賊去關門濟何事也死生事大須是自家著力始得若一念差錯歷劫受苦誰人相代思之思之慈照宗主淨土十門告誡云念佛人臨終三疑三關不可不慎一者疑我生來作業極重修行日淺恐不得生三者疑我欠人債負或有心願未了及貪嗔癡未息恐不得生三者疑我雖念彌陀臨命終時恐佛不來接引有此三疑因疑成障失其正念之得往生故念佛之人切要諦信佛經明旨勿生疑心三關者凡夫雖有信心念佛緣宿業障重合墮地獄臨終不免病苦若因病苦益知悔悟身心決生淨土也只緣無智之人不了此事却言我今念佛又有病苦反謗彌陀因此一念惡心徑入地獄此是一關也二者雖則持戒念佛緣平日口談淨土而意思尚戀娑婆以致臨終遭病怕死貪生信受童兒呼神喚鬼燒錢化紙殺戮生命緣此心邪無佛攝護流浪墮落三塗是二關也三者臨終之際繫綴資財愛戀眷屬心放不下顧于家庭墮鬼趣中或為慳犬或作蛇身守護家庭宛如在日是為三關也先德云天堂地獄兩邊排任居修向那邊來誠哉是言也或曰如師之説實有六道三塗輪回受苦乎答若無六道輪回三塗八難老僧亦不肯持齋戒斷酒肉苦參禪勤念佛矣因是有輪回苦楚才肯念佛修行願捨娑婆願生淨土我以直告仁者要見世上之人誰不愛色欲不好酒肉不貪名利不願富貴吾知此是輪回苦本是以不謀不求也法華經云諸苦所因貪欲為本若滅貪欲無所依止西方偈贊西方慈父動悲哀接引迷流歸去來早向蓮臺親託質莫投凡世入胞胎西方淨土有蓮胎普勸衆生歸去來一念筆開親見佛永無八難與三災西方不擇富和貧不揀賢愚貴賤人不問女男并老幼不分僧俗及冤親西方法眷最相親盡是修行念佛人我等欲歸安養國即今便種往生因西方極樂衆稱尊普勸諸人入此門有口不須間講論單提佛號度朝昏西方有佛號彌陀普度衆生出愛河六八願開通九品人人可到莫蹉跎西方易往少人知徑路修行不用疑六字真經純熟了金蓮臺上禮阿彌西方慈父號阿彌接引人生九品池捷徑法門容易到可憐多是自狐疑西方直指易修持本性彌陀孰得知六道三塗生死轉思量怎不痛傷悲西方急急早修持生死無常不可期窗外日光彈指過為人能有幾多時西方公案早行持寂寂惺惺著意疑疑到情忘心絶處元來自己是阿彌卓吾歸元直指論曰此宗本一元師之書也本欲人專修淨土故作是書所以詳引曲證發明示人者至矣盡矣其間真實簡便尤諸師諸説之所未顯謂念佛初不問是何人則凡以平生惡業太多自諉而不肯念佛者謬矣謂念佛初不管是何時則凡以年老及臨命終自推托而不肯念佛者謬矣謂念佛初不拘是何方法則凡立為一定規程使千人同一律千古同一樣使人有所妨礙而不能周遍大地者謬矣唯是真心發願願見彼佛阿彌陀願生極樂國永脫此五濁惡世不淨苦惱之身為急耳並無如許錯謬指示以眩惑退怯于人也可知三謬皆師過咎非干學者之事獨一願門最為喫緊泛觀人世又誰不願往生極樂舍此苦海而不肯發願也耶又誰不願一念即至不費心力而委曰吾不暇發願也耶故知發願最緊一發本願又最易事我知盡大地衆生無有不發大願者矣本師之有功德何如哉西方五請西方説卓吾子曰西方金方也金至剛能推壞萬物而物不能壞之佛性堅剛不壞亦如是故以為喻也故以金剛名經又以西方名佛也夫法身堅固無相無住是故不壞故又曰凡所有相皆是虗妄所以謂之虗妄者以其可壞也所以可得而壞者以其有相也夫唯無相則無住無住則無壞由此觀之無壞真身即各在于當人西方極樂總不離于日用而乃教人刻意參禪求佛何哉不特是也教人坐禪教人修定教人煉魔教人燃身教人斷臂教人修三堅法教人捨身命財教人修六度萬行難行能行難捨能捨難忍能忍如是修行曠世纍劫庶得成就豈非修有相之佛而欲以證無生之理乎積有漏之因而欲以希常住無漏之果乎縱經塵劫決不能就而佛反教人為之何哉蓋衆生愚迷既以佛為決不可成之物又枉誣釋迦老子以為是曾經無量億劫承事善知識刻苦修習而至非我等衆生所可希冀也夫既以己為衆生即是有衆生相矣又以佛為不可冀即是有壽者相矣壽者相即人相衆生相即我相四相宛然何時能信無相佛事耶佛憫此故故廣開方便法門任其隨意修者縱不成佛亦得善果如果有大弘願聖固力者纍劫辛勤日暮途遠自然回頭反顧覺迷知非耳此時若頓爾放下便是真放下頓爾安穩便是真安穩雖是塵劫徒勞然不如是則信根不深得之亦不堅固也是以不得不聽其如此也但如此修行是必待億萬劫方始成得一箇佛爾在佛子則為世間未常有之佛子在釋迦亦為望得眼穿纍劫不能成得一箇半箇佛矣況人生一世光陰有幾二十以前癡不知世故也五十以後衰懶散世故也中間二十餘年只了得婚娶仕宦等業障天安有半個人肯發心説到此者乎是佛種不免斷滅矣故佛特開此一門專教人念佛謂西方有阿彌陀佛願力廣大但能持我名號歸依西方者無不接引之隨其念力之淺深以生九品之上下下品化生者雖不得見佛亦得近佛如今兩京十三省官員是也雖不見至尊然皆奉符節而行政令人人皆以係至尊差遣之人畏仰之矣誰敢犯之乎若上品化生者即今之卿相大臣是也此其挹至尊之威光奉至尊之嚴命雖有大魔王大修羅王亦且退避三舍況閻羅王敢啓齒其間哉所以然者以佛願廣大本真實而不虗故臨命終時佛乘願力自來接引如母求子一般更有何難乎以己信力隨念往生如子憶母一般更有何險乎兩情合并同歸百方又何疑耶且一聲阿彌陀原不費才毫友氣又不妨半點家事手持足屨幹辨常務直信心一念耳誰不能為誰不能念故今四海九州之人四夷八蠻之國一聲阿彌陀遍滿三千大千世界者以此故也其中若有真聰明大志氣者因念佛而即見自己西方佛又豈非盛德事耶以此見念佛之功德溥矣故能大師有云此去西方里數有十萬八千如人身中十惡八邪若無邪惡當時自至説遠謂其下根説近謂其上智蓋以上智之人開口念佛便是西方極樂既無一點塵勞可以障蔽即是除去十萬八千非別有所謂邪念惡念為吾障蔽也然則教人念佛者不過欲人見佛耳見佛者既自簡易直截往生者又自坦平無阻故永明壽禪師有萬修萬人去之喻云既生西方可以見佛亦可以見自己佛其視當下見佛者只爭遲速間耳遲速雖不同及其既見佛又何不同之有也然則即今但能信佛念佛者又安知不是億劫承事善知識苦行薰修以至此耶念佛真義所謂念佛者非口念之念乃心念之念也心之所念者想之所注也志之所趨也愛之所鍾也情之所繫也思之所極而謀之所必得也觀於人世可見矣世有以好色為心者則念念唯色色之外百不上心矣有以營生為心者則念念生財財之外百不上心矣以求貴為心者則念念思貴貴之外百不上心矣以至子子孫孫永人為心者則念念在于貽厥貽厥之外百不足以上其心矣此等終日亦何嘗口念於是然期而至望而企日夜不休鮮不副其念者則以心念之者確也雖或雜以他事然終不足以易其正念則念佛者可知矣蓋人之念頭所係最急如水之必赴海如火之必炎上如利刃之必傷如毒藥之必死無空過者念佛之念亦如是也則雖不念一聲佛固終日念佛也若或將信將疑未知的有西方與否則雖念佛以為工課千聲以為法則亦徒勞耳全不信佛是衆生之母無有母不憶子之理只愁子不念母耳果一心念母則母即在于子前只是肉眼看不見耳何待他日而後見又何待他日而後往耶又豈若好貴好貨等須積纍而後至或聽天所命而猶有不至者耶近聞有異夢者三人其三人者雖至愚亦大驚怖蓋其夢既異既醒又有大徵故懼耳余聞而作念佛偈以贊之冀其或肯轉念向佛惜哉無福難度也全不思此夢非常全不思佛正欲以此夢警覺衆生而卒以夙念堅固湯火競馳竟作夢會可悲也夫答西方問佛者非他二心是矣此心人人具有物物各具其發而不測則謂此心之神其應而不有則謂與物俱化神則無方可拘故出生入死推行而不滯於一隅化則無迹可留故或生或死變化而卒歸乎幻妄人唯不知是心之神化而執神化者遂謂之吾心是以沈溺于生死之中改換于輪回之頃萬劫千生任其變幻或時福德多故即生天堂或時以天堂享福太過故復下地獄唯聖人知此輪回生死之場非有識者所宜安居故十有五歲便欲志道以此道即神化自出之地生死之根本也本自無生豈有死乎本自無死寧有生哉故曰朝聞道夕死可矣言可以死而不復輪回于六趣也佛氏重之故終年纍歲唯日與諸弟子等共談此理乃賢智者恃其聰明不信自己本來無生本來空空本來清淨本來至足反欲加以聰明廣以知見而不知其卒入于生死輪回之中于是焉不得已復指示衆生以念佛之路謂西方有阿彌陀佛發願欲接引念佛衆生同歸極樂淨土既生淨土亦可暫免輪回生死之苦他時後日密邇佛光親證無生必矣故有大彌陀小彌陀等經今日夕工課所誦者小彌陀經耳皆説蓮華化生不比胞胎凡質所聞皆佛語所見皆佛事極樂無可比者此豈誑人語哉佛言我若誑人當代衆生受塵沙劫拔舌地獄苦此豈細事而佛敢以誑人哉蓋佛每入定時盡受十方天堂地獄與夫龍宮海藏各處説法之請是以盡行遍會塵沙諸佛況阿彌陀佛而不與會耶故佛特具言之此係佛之至言唯目瞇凡夫不可與言吁安有大聖人出世事而可與凡夫言哉與關僧如正書昨會企庵殿下具道我如正師自幼不羣今閉關三年是真實為性命者矣所恨敝寓隔遠不獲時從扣關問訊也大抵學佛者門戶雖多唯有二種二種者何一念佛二參禪也參禪欲見自己佛見自己佛即自成佛但根器淺者多信不及信不及故見不徹所謂當面蹉過者是也念佛欲見彼阿彌陀佛見彼佛則長往佛國日聞佛音日見佛事終久亦見自己佛成自己佛比之參禪成佛者雖遲速不同其為欲成自己佛一也其為得免輪回生死之苦不受一切天堂地獄善惡諸趣所攝亦一也蓋阿彌陀佛有願接引一切念佛衆生同生淨土故其言曰衆生有盡我願無窮若有一衆生不成佛終不於此取泥洹夫衆生決無盡期則佛願亦決無了期明矣佛願如此而謂佛不肯接引我者未之有也但衆生世間習重恩愛情濃自不信佛自不肯往自不聽他接引耳雖佛有願其奈衆生何今如正既一心信佛一心念佛何患不生極樂乎既生極樂皈依父母有何天堂地獄等趣敢妄勾攝我也幸善念之念佛八偈南無阿彌陀佛是我六字真經念得提心在口去時把臂同行南無阿彌陀佛是我西方公據念時信口純熟行時信步將去南無阿彌陀佛透過地網天羅見身猶是衆生來身便是彌陀南無阿彌陀佛不用花言巧説我若真實念佛佛便為我説法南無阿彌陀佛聲聲叫得慈悲大悲救苦衆生大悲故願無違南無阿彌陀佛願我今生證果但念彌陀一聲自出蓮華一朵南無阿彌陀佛我是他家兒孫莫愁呼他不應只愁我不上門南無阿彌陀佛他是我家宗祖但能真心念之永脫輪回苦趣
